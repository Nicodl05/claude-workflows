name: Claude Code Issue Handler

on:
  workflow_call:
    inputs:
      issue_number:
        description: GitHub issue number to process
        required: true
        type: number
      issue_title:
        description: Title of the issue
        required: true
        type: string
      issue_body:
        description: Body of the issue
        required: false
        type: string
        default: ""
      issue_labels:
        description: JSON array of label names on the issue
        required: false
        type: string
        default: "[]"
    secrets:
      ANTHROPIC_API_KEY:
        description: Anthropic API key for Claude Code
        required: true
      GH_PAT:
        description: Personal access token with repo, workflow, issues, and pull-requests scopes
        required: true

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_MODEL: claude-haiku-4-5-20251001

jobs:
  handle-issue:
    name: Handle issue
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Compute branch name
        id: branch
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
        run: |
          slug=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 ]//g' \
            | tr ' ' '-' \
            | sed 's/-\+/-/g' \
            | cut -c1-50 \
            | sed 's/-$//')
          branch="feature/issue-${ISSUE_NUMBER}-${slug}"
          echo "name=${branch}" >> "$GITHUB_OUTPUT"

      - name: Create and push branch
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

      - name: Build Claude prompt
        id: prompt
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_BODY: ${{ inputs.issue_body }}
          ISSUE_LABELS: ${{ inputs.issue_labels }}
          BRANCH: ${{ steps.branch.outputs.name }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/claude-prompt.txt << 'PROMPT_EOF'
          You are implementing a GitHub issue. Follow these mandatory rules:

          Workflow:
          1. Read the Graphify graph from ~/.claude/skills/graphify/references/ if available to understand the codebase.
          2. Read the issue details below and fetch relevant documentation via the context7 MCP server.
          3. Implement the requested changes following all quality rules.
          4. Write or update tests for every change.
          5. If an architecture decision was made, create or update an ADR in docs/adr/ using MADR format.
          6. Commit changes using conventional commits (feat:, fix:, chore:, docs:, refactor:, test:, ci:).

          Code quality rules:
          - Clean code: single responsibility, DRY, meaningful names, small functions.
          - Type hints / strict typing on all languages that support it.
          - No hardcoded secrets — environment variables only.
          - Validate and sanitize all inputs.
          - No emojis in code, comments, or generated content.
          - English only for code, comments, variable names, function names, and commit messages.

          Issue details:
          PROMPT_EOF

          {
            echo "ISSUE NUMBER: $ISSUE_NUMBER"
            echo "ISSUE TITLE: $ISSUE_TITLE"
            echo "ISSUE LABELS: $ISSUE_LABELS"
            echo ""
            echo "ISSUE BODY:"
            echo "$ISSUE_BODY"
          } >> /tmp/claude-prompt.txt

          echo "prompt_file=/tmp/claude-prompt.txt" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          claude \
            --allowedTools "Bash,Read,Edit,Write" \
            --dangerously-skip-permissions \
            --print "$(cat /tmp/claude-prompt.txt)"

      - name: Protect workflow files
        run: |
          git reset HEAD .github/workflows/ 2>/dev/null || true
          git checkout -- .github/workflows/ 2>/dev/null || true

      - name: Commit and push changes
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "feat: implement issue #${ISSUE_NUMBER} via Claude Code"
          git push origin "$BRANCH"

      - name: Open pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ steps.branch.outputs.name }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
        run: |
          pr_url=$(gh pr create \
            --title "feat: $ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUMBER}

          Implemented automatically by Claude Code in response to issue #${ISSUE_NUMBER}.

          Status: awaiting-review" \
            --label "awaiting-review" \
            --base main \
            --head "$BRANCH" \
            2>/dev/null || gh pr view "$BRANCH" --json url -q .url)

          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "Claude Code has opened a pull request to address this issue: ${PR_URL}"
